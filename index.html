<!DOCTYPE html>
<html>
<head>
    <title>Photowalk Learning</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">

  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav mr-auto">

      <li class="nav-item active">
        <a class="nav-link" href="#home">Home</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#gallery">Gallery</a>
      </li>

      <!-- BOOKING PAGE LINK -->
      <li class="nav-item">
        <a class="nav-link" href="booking.html">
          Booking
        </a>
      </li>

      <!-- CONTACT POPUP -->
      <li class="nav-item">
        <a class="nav-link" href="#" data-toggle="modal" data-target="#contactModal">
          Contact
        </a>
      </li>

    </ul>
  </div>

</nav>

<!-- HEADER -->
<header id="home">
    <h1>Gotcha Production</h1>
    <p>Learn photography through real photowalk experiences</p>
</header>

<!-- HERO -->
<section class="hero">
    <h2>Start Your Photography Journey</h2>

    <button onclick="window.location.href='basics.html'">
        Get Started
    </button>

    <!-- BOOKING BUTTON -->
    <button onclick="window.location.href='booking.html'">
        Book Photowalk
    </button>
</section>

<!-- GALLERY -->
<section class="gallery" id="gallery">
    <h2>Gallery</h2>

    <div class="gallery-row">
        <img src="images/dungeon revise side view.png" alt="Photo 1">
        <img src="images/dungeon revise top view.png" alt="Photo 2">
        <img src="images/dungeon revise.png" alt="Photo 3">
    </div>
</section>

<!-- FOOTER -->
<footer id="contact">
    <p>© 2026 Photowalk Learning</p>
</footer>

<!-- CONTACT MODAL (CENTERED POPUP) -->
<div class="modal fade" id="contactModal" tabindex="-1" role="dialog">

  <div class="modal-dialog modal-dialog-centered" role="document">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Contact Us</h5>
        <button type="button" class="close" data-dismiss="modal">
          <span>&times;</span>
        </button>
      </div>

      <div class="modal-body">
        <p> Gotcha Production</p>
        <p> Email: gotchaproduction@gmail.com</p>
        <p> Phone: +63 900 000 0000</p>
        <p> Location: Philippines</p>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">
          Close
        </button>
      </div>

    </div>

  </div>
</div>

<!-- AUDIO -->
<audio id="clickSound" src="sounds/click1.mp3" preload="auto"></audio>

<!-- BOOTSTRAP JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<!-- SCRIPT -->
<script src="script.js"></script>

</body>
</html>
