<!DOCTYPE html>
<html>
<head>
    <title>Photowalk Learning</title>

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-light">

  <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNav">
    <span class="navbar-toggler-icon"></span>
  </button>

  <div class="collapse navbar-collapse" id="navbarNav">
    <ul class="navbar-nav mr-auto">

      <li class="nav-item active">
        <a class="nav-link" href="#home">Home</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#gallery">Gallery</a>
      </li>

      <li class="nav-item">
        <a class="nav-link" href="#about">About</a>
      </li>

      <!-- CONTACT BUTTON (POPUP) -->
      <li class="nav-item">
        <a class="nav-link" href="#" data-toggle="modal" data-target="#contactModal">
          Contact
        </a>
      </li>

    </ul>
  </div>

</nav>

<!-- HEADER -->
<header id="home">
    <h1>Gotcha Production</h1>
    <p>Learn photography through real photowalk experiences</p>
</header>

<!-- HERO -->
<section class="hero">
    <h2>Start Your Photography Journey</h2>
    <button onclick="start()">Get Started</button>
</section>

<!-- GALLERY -->
<section class="gallery" id="gallery">
    <h2>Sample Photos</h2>

    <div class="gallery-row">
        <img src="images/ron1.jpeg" alt="Photo 1">
        <img src="images/ron2.jpeg" alt="Photo 2">
        <img src="images/ron3.jpeg" alt="Photo 3">
    </div>
</section>

<!-- FOOTER -->
<footer id="contact">
    <p>© 2026 Photowalk Learning</p>
</footer>

<!-- CONTACT POPUP (MODAL) -->
<div class="modal fade" id="contactModal" tabindex="-1" role="dialog">
  <div class="modal-dialog" role="document">

    <div class="modal-content">

      <div class="modal-header">
        <h5 class="modal-title">Contact Us</h5>
        <button type="button" class="close" data-dismiss="modal">
          <span>&times;</span>
        </button>
      </div>

      <div class="modal-body">
        <p>📸 Gotcha Production</p>
        <p>📧 Email: gotcha@email.com</p>
        <p>📱 Phone: +63 900 000 0000</p>
        <p>📍 Location: Philippines</p>
      </div>

      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-dismiss="modal">
          Close
        </button>
      </div>

    </div>

  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js"></script>

<script src="script.js"></script>
</body>
</html>
