<!DOCTYPE html>
<html>
<head>
    <title>Photowalk Basics</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HEADER -->
<header>
    <h1>📸 Photowalk Basics</h1>
    <p>Learn how to conduct a proper photowalk</p>
</header>

<!-- CONTENT -->
<section class="content">

    <h2>📍 What is a Photowalk?</h2>
    <p>
        A photowalk is when photographers walk around a location and take photos while learning composition, lighting, and storytelling.
    </p>

    <h2>🎥 Watch Tutorial</h2>

    <iframe width="560" height="315"
        src="https://www.youtube.com/embed/FazgJVnrVuI"
        title="YouTube video"
        frameborder="0"
        allowfullscreen>
    </iframe>

    <br><br>

    <!-- BACK BUTTON -->
    <button onclick="goHome()">⬅ Back to Home</button>

</section>

<!-- AUDIO -->
<audio id="clickSound" src="sounds/click1.mp3" preload="auto"></audio>

<!-- SCRIPT -->
<script>

// 🔊 CLICK SOUND + NAVIGATION FIX
function goHome() {
    const sound = document.getElementById("clickSound");

    if (sound) {
        sound.currentTime = 0;
        sound.play();
    }

    // wait for sound before redirect
    setTimeout(function() {
        window.location.href = "index.html";
    }, 300);
}

</script>

</body>
</html>
