<!DOCTYPE html>
<html>
<head>
    <title>Book a Photowalk</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Book a Photowalk</h1>
    <p>Reserve your spot for photography sessions</p>
</header>

<section class="content">

    <form onsubmit="submitBooking(event)">

        <label>Name:</label><br>
        <input type="text" id="name" required><br><br>

        <label>Email:</label><br>
        <input type="email" id="email" required><br><br>

        <label>Date:</label><br>
        <input type="date" id="date" required><br><br>

        <label>Location:</label><br>
        <input type="text" id="location" required><br><br>

        <button type="submit">Book Now</button>

    </form>

    <p id="msg"></p>

    <br>
    <button onclick="window.location.href='index.html'">⬅ Home</button>

</section>

<!-- AUDIO -->
<audio id="clickSound" src="sounds/click1.mp3" preload="auto"></audio>

<script>
function submitBooking(event) {
    event.preventDefault();

    let name = document.getElementById("name").value;
    let date = document.getElementById("date").value;

    document.getElementById("msg").innerHTML =
        "✅ Thank you " + name + "! Your booking for " + date + " is saved (demo only).";
}

// CLICK SOUND SYSTEM
document.addEventListener("click", function(e) {
    if (e.target.tagName === "BUTTON" || e.target.tagName === "A") {
        const sound = new Audio("sounds/click1.mp3");
        sound.volume = 0.7;
        sound.play();
    }
});
</script>

</body>
</html>
